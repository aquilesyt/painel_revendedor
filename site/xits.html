<script>
/* --- ANIMAÇÃO DE NEVE --- */
const canvas = document.getElementById("snowCanvas");
const ctx = canvas.getContext("2d");
let flakes = [];
function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

function Snow() {
    this.x = Math.random() * canvas.width;
    this.y = Math.random() * canvas.height;
    this.r = Math.random() * 2 + 1;
    this.d = Math.random() + 0.5;
}
Snow.prototype.update = function() {
    this.y += this.d;
    if (this.y > canvas.height) {
        this.y = -10;
        this.x = Math.random() * canvas.width;
    }
};
Snow.prototype.draw = function() {
    ctx.beginPath();
    ctx.fillStyle = "white";
    ctx.arc(this.x, this.y, this.r, 0, 2 * Math.PI);
    ctx.fill();
};
for (let i = 0; i < 100; i++) flakes.push(new Snow());
function animateSnow() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    for (let f of flakes) { f.update(); f.draw(); }
    requestAnimationFrame(animateSnow);
}
animateSnow();

/* --- Modal content definitions (you can change links here) --- */

            { label: "COMO PASSAR NO ENCURTADOR", href: "https://youtube.com/shorts/oQ7ZgoCp4Kg?si=3yxLUdN_eujNtp0A" }
        ]
    },

            { label: "DOWNLOAD HOLOGRAMA", href: "https://sub2unlock.me/HsRIARR" },
            { label: "TUTORIAL PASSAR NO ENCURTADOR", href: "https://youtube.com/shorts/oQ7ZgoCp4Kg?si=3yxLUdN_eujNtp0A" },
            { label: "LINK DIRETO AQUI, GO 300 SUBS", href: "https://chat.whatsapp.com/BmpZMLBQjJ2LfOXWSaKz9X?mode=hqrt1" }

/* --- Open modal with chosen menu id --- */
const modalBack = document.getElementById('modalBack');
const modalTitle = document.getElementById('modalTitle');
const modalActions = document.getElementById('modalActions');

function openMenu(menuId){
    const menu = MENUS[menuId];
    if(!menu) return;
    modalTitle.textContent = menu.title;
    modalActions.innerHTML = ''; // reset

    // create buttons centered and identical style
    menu.buttons.forEach(b=>{
        const a = document.createElement('a');
        a.className = 'link-btn';
        a.href = b.href || '#';
        a.target = '_blank';
        a.rel = 'noopener noreferrer';
        a.textContent = b.label;
        modalActions.appendChild(a);
    });

    // show modal
    modalBack.style.display = 'flex';
}

/* --- close modal --- */
function closeMenu(e){
    if(e) e.stopPropagation?.();
    modalBack.style.display = 'none';
}

/* close on Escape */
document.addEventListener('keydown', (ev)=>{
    if(ev.key === 'Escape') closeMenu();
});
