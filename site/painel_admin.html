<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Painel Administrativo</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #000;
      color: #fff;
    }

    header {
      padding: 20px;
      background-color: #1a1a1a;
      text-align: center;
      font-size: 24px;
      font-weight: bold;
      color: #ff0000;
    }

    .container {
      padding: 20px;
    }

    .card {
      background-color: #111;
      border-radius: 8px;
      padding: 20px;
      margin: 20px 0;
      box-shadow: 0 0 10px rgba(255, 0, 0, 0.3);
    }

    .card h2 {
      color: #ff0000;
    }

    .button {
      display: inline-block;
      margin-top: 10px;
      padding: 10px 20px;
      background: linear-gradient(135deg, #ff0000, #990000);
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
      transition: background 0.3s ease;
    }

    .button:hover {
      background: linear-gradient(135deg, #cc0000, #660000);
    }

    .item {
      margin-top: 10px;
    }

    .hidden {
      display: none;
    }

    .key-item {
      margin: 5px 0;
    }
  </style>
</head>
<body>
  <header>Painel do Administrador</header>
  <div class="container">

    <div class="card">
      <h2>🔑 Gerar Key</h2>
      <button class="button" onclick="gerarKey()">Gerar Key de Acesso</button>
      <p id="keyGerada" style="margin-top:10px;"></p>
    </div>

    <div class="card">
      <h2>📋 Lista de Keys</h2>
      <div id="listaKeys">Carregando...</div>
    </div>

    <div class="card">
      <h2>👥 Usuários Cadastrados</h2>
      <p>Total: <span id="totalUsuarios">--</span></p>
      <button class="button" onclick="toggle('usuarios')">Mostrar/Esconder Lista</button>
      <div id="usuarios" class="hidden"></div>
    </div>

    <div class="card">
      <h2>💰 Saldo Total por Usuário</h2>
      <button class="button" onclick="toggle('saldos')">Mostrar/Esconder</button>
      <div id="saldos" class="hidden"></div>
    </div>

    <div class="card">
      <h2>💸 Comissões Pagas</h2>
      <button class="button" onclick="toggle('comissoes')">Mostrar/Esconder</button>
      <div id="comissoes" class="hidden"></div>
    </div>

    <div class="card">
      <h2>📈 Estatísticas da Página Inicial</h2>
      <p>Total de Acessos: <span id="acessosTotais">--</span></p>
      <ul>
        <li>XITS CAPA ROYALE: <span id="cliquesCapa">--</span></li>
        <li>XITS FREE FIRE: <span id="cliquesFreefire">--</span></li>
        <li>XITS STANDOFF2: <span id="cliquesStandoff">--</span></li>
      </ul>
    </div>

  </div>

  <script>
    const toggle = (id) => {
      const el = document.getElementById(id);
      el.classList.toggle('hidden');
    }

    function gerarKey() {
      fetch("/api/keys", { method: "POST" })
        .then(res => res.json())
        .then(data => {
          document.getElementById("keyGerada").innerText = "Key gerada: " + data.key;
          carregarKeys();
        });
    }

    function revogarKey(key) {
      fetch(`/api/keys/revogar/${key}`, { method: "PATCH" })
        .then(res => res.json())
        .then(() => carregarKeys());
    }

    function carregarKeys() {
      fetch("/api/keys")
        .then(res => res.json())
        .then(keys => {
          const lista = document.getElementById("listaKeys");
          lista.innerHTML = "";
          keys.forEach(k => {
            const div = document.createElement("div");
            div.className = "key-item";
            div.innerHTML = `🔑 ${k.key} - ${k.status} 
              ${k.status !== 'revogada' ? `<button class="button" onclick="revogarKey('${k.key}')">Revogar</button>` : ""}`;
            lista.appendChild(div);
          });
        });
    }

    async function carregarUsuarios() {
      const res = await fetch("/api/users");
      const users = await res.json();

      document.getElementById("totalUsuarios").innerText = users.length;

      const listaU = document.getElementById("usuarios");
      const listaS = document.getElementById("saldos");
      const listaC = document.getElementById("comissoes");

      listaU.innerHTML = "";
      listaS.innerHTML = "";
      listaC.innerHTML = "";

      users.forEach(u => {
        listaU.innerHTML += `<div class="item">👤 ${u.nome} - WhatsApp: ${u.whatsapp}</div>`;
        listaS.innerHTML += `<div class="item">💰 ${u.nome} - R$ ${u.saldo_total.toFixed(2)}</div>`;
        listaC.innerHTML += `<div class="item">💸 ${u.nome} - R$ ${u.comissao_paga.toFixed(2)}</div>`;
      });
    }

    async function carregarEstatisticas() {
      const res = await fetch("/api/estatisticas");
      const dados = await res.json();
      document.getElementById("acessosTotais").innerText = dados.total_acessos;
      document.getElementById("cliquesCapa").innerText = dados.cliquesCapa;
      document.getElementById("cliquesFreefire").innerText = dados.cliquesFreefire;
      document.getElementById("cliquesStandoff").innerText = dados.cliquesStandoff;
    }

    carregarKeys();
    carregarUsuarios();
    carregarEstatisticas();
  </script>
</body>
</html>
