<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;
  background:#000;
  color:#fff;
  text-align:center;
  padding:30px 10px;
  overflow-x:hidden;
}

/* PARTICLES */
#particles-js{
  position:fixed;
  inset:0;
  z-index:0;
}

/* MENU */
.menu-toggle{
  position:fixed;
  top:15px;
  left:15px;
  background:#ff0000;
  color:#fff;
  border:none;
  padding:10px 15px;
  font-weight:bold;
  border-radius:6px;
  cursor:pointer;
  z-index:30;
  box-shadow:0 0 10px #ff0000;
}

.side-panel{
  position:fixed;
  top:0;
  left:0;
  width:220px;
  height:100%;
  background:rgba(0,0,0,.95);
  padding:20px;
  transform:translateX(-100%);
  transition:.4s;
  z-index:29;
}

.side-panel.show{transform:translateX(0)}

.side-panel a{
  display:block;
  margin-top:25px;
  padding:12px;
  background:linear-gradient(135deg,#00c3ff,#0044ff);
  color:#fff;
  font-weight:bold;
  font-size:.85rem;
  border-radius:8px;
  text-decoration:none;
}

/* OVERLAY */
#overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.6);
  z-index:28;
  opacity:0;
  pointer-events:none;
}

#overlay.show{
  opacity:1;
  pointer-events:all;
}

/* HEADER */
h1{
  margin-top:4rem;
  font-size:2.4rem;
  z-index:2;
  position:relative;
}

.typed-text{
  color:#ccc;
  margin:10px 0 25px;
  min-height:28px;
  z-index:2;
  position:relative;
}

/* FOTO */
.circle-img{
  width:170px;
  height:170px;
  border-radius:50%;
  border:4px solid crimson;
  overflow:hidden;
  margin:0 auto 25px;
  z-index:2;
  position:relative;
  box-shadow:0 0 25px crimson;
}

.circle-img img{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* LINKS */
.links{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:12px;
  max-width:380px;
  margin:0 auto 35px;
  z-index:2;
  position:relative;
}

.links a{
  padding:12px;
  font-size:.85rem;
  background:linear-gradient(135deg,#ff0000,#990000);
  border-radius:10px;
  color:#fff;
  text-decoration:none;
  font-weight:bold;
  box-shadow:
    0 0 10px #ff0000,
    0 0 25px #ff0000;
  transition:.3s;
}

.links a:hover{
  box-shadow:
    0 0 20px #ff0000,
    0 0 45px #ff0000;
}

/* CATEGORIA CENTRAL */
.categoria{
  display:flex;
  justify-content:center;
  margin:0 auto 18px;
  z-index:2;
  position:relative;
}

.categoria span{
  padding:9px 18px;
  border:2px solid #ff0000;
  border-radius:30px;
  font-size:.85rem;
  box-shadow:
    0 0 10px #ff0000,
    0 0 25px #ff0000,
    0 0 40px #ff0000;
}

/* CARDS */
.cards{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:16px;
  max-width:380px;
  margin:0 auto 40px;
  z-index:2;
  position:relative;
}

.card{
  border:2px solid #ff0000;
  border-radius:14px;
  padding:12px;
  background:#000;
  box-shadow:
    0 0 15px #ff0000,
    0 0 35px #ff000055;
  transition:.3s;
}

.card:hover{
  transform:translateY(-5px);
  box-shadow:
    0 0 25px #ff0000,
    0 0 55px #ff0000;
}

.card img{
  width:100%;
  border-radius:10px;
}

.card h3{
  font-size:.9rem;
  margin:10px 0;
}

.card a{
  display:block;
  padding:8px;
  background:#ff0000;
  border-radius:8px;
  font-size:.8rem;
  text-decoration:none;
  color:#fff;
  font-weight:bold;
  box-shadow:
    0 0 10px #ff0000,
    0 0 30px #ff0000;
  transition:.3s;
}

.card a:hover{
  box-shadow:
    0 0 20px #ff0000,
    0 0 45px #ff0000;
}

/* FOOTER */
footer{
  font-size:.85rem;
  margin-top:30px;
  text-shadow:0 0 15px #ff00ff;
  z-index:2;
  position:relative;
}
</style>
</head>
