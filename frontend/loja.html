    * {

    body {

      position: relative;
      opacity: 0;

    @keyframes titleGlow {

    p {

      max-width: 600px;

    .buttons {
      margin-top: 40px;
      display: flex;
      justify-content: center;
      gap: 20px;
      flex-wrap: wrap;
      position: relative;
      z-index: 1;
    }

    button {
      background: linear-gradient(90deg, #220000, #440000);
      border: 2px solid #ff0000;
      color: white;
      padding: 12px 25px;
      border-radius: 10px;
      font-size: 1em;
      cursor: pointer;
      transition: 0.3s;
      position: relative;
      overflow: hidden;
      z-index: 2;
      box-shadow: 0 0 10px #ff0000;
    }

    button:hover {
      background: #ff0000;
      box-shadow: 0 0 30px #ff0000, 0 0 60px #ff3333;
      transform: scale(1.05);
    }

    .info-container {
      margin-top: 30px;
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 15px;
      animation: fadeIn 0.4s ease-in-out;
      position: relative;
      z-index: 2;
    }

    .info-btn {
      width: 250px;
      background: #0d0d0d;
      border: 1px solid #ff0000;
      color: #fff;
      padding: 12px;
      border-radius: 10px;
      transition: 0.3s;
      box-shadow: 0 0 10px #ff0000;
    }

    .info-btn:hover {
      background: #ff0000;
      box-shadow: 0 0 15px #ff0000;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* --- GALERIA --- */
    .galeria {
      margin-top: 80px;
      position: relative;
      z-index: 1;
    }

    .galeria h2 {
      color: #ff0000;
      font-size: 1.8em;
      text-shadow: 0 0 10px #ff0000;
      margin-bottom: 30px;
      animation: glowText 3s infinite alternate;
    }

    @keyframes glowText {
      from { text-shadow: 0 0 10px #ff0000; }
      to { text-shadow: 0 0 30px #ff3333; }
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 15px;
      width: 90%;
      max-width: 1000px;
      margin: 0 auto;
    }

    .foto {
      position: relative;
      overflow: hidden;
      border-radius: 10px;
      border: 2px solid #ff0000;
      transform: translateY(30px);
      opacity: 0;
      transition: 0.8s ease;
      cursor: pointer;
      box-shadow: 0 0 20px #660000;
    }

    .foto.visible {
      transform: translateY(0);
      opacity: 1;
    }

    .foto img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.5s ease;
    }

    .foto:hover img {
      transform: scale(1.1);
    }

    /* Lightbox */
    .lightbox {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.9);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 99;
      animation: fadeIn 0.3s ease;
    }

    .lightbox img {
      max-width: 90%;
      max-height: 85%;
      border-radius: 10px;
      border: 2px solid #ff0000;
      box-shadow: 0 0 20px #ff0000;
    }

    .lightbox.show {
      display: flex;
    }

    /* Transição de saída futurista */
    .page-transition {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle, #ff0000 0%, #000 80%);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.6s ease;
      z-index: 200;
    }

    .page-transition.active {
      opacity: 1;
      pointer-events: all;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>

  <script>
    // Mostrar/ocultar INFO
    const infoBtn = document.getElementById('infoBtn');
    const infoContainer = document.getElementById('infoContainer');
    infoBtn.addEventListener('click', () => {
      infoContainer.style.display = infoContainer.style.display === 'flex' ? 'none' : 'flex';
      infoBtn.innerHTML = infoContainer.style.display === 'flex' ? 'INFO ⬆' : 'INFO ⬇';
    });

    // Lightbox
    const fotos = document.querySelectorAll('.foto img');
    const lightbox = document.getElementById('lightbox');
    const lightboxImg = lightbox.querySelector('img');
    fotos.forEach(foto => {
      foto.addEventListener('click', () => {
        lightbox.classList.add('show');
        lightboxImg.src = foto.src;
      });
    });
    lightbox.addEventListener('click', () => lightbox.classList.remove('show'));

    // Efeito de rolagem nas fotos
    const fotosDiv = document.querySelectorAll('.foto');
    window.addEventListener('scroll', () => {
      fotosDiv.forEach(f => {
        const pos = f.getBoundingClientRect().top;
        const windowHeight = window.innerHeight;
        if (pos < windowHeight - 50) f.classList.add('visible');
        else f.classList.remove('visible');
      });
    });

    // Transição de saída futurista
    const comprarBtn = document.getElementById('comprarBtn');
    const transition = document.getElementById('transition');
    comprarBtn.addEventListener('click', () => {
      transition.classList.add('active');
      setTimeout(() => {
        window.location.href = 'produtos.html';
      }, 600);
    });

    // Partículas vermelhas
    const canvas = document.getElementById('particles');
    const ctx = canvas.getContext('2d');
    let particlesArray;
    canvas.width = innerWidth;
    canvas.height = innerHeight;

    window.addEventListener('resize', function() {
      canvas.width = innerWidth;
      canvas.height = innerHeight;
      init();
    });

    class Particle {
      constructor() {
        this.x = Math.random() * canvas.width;
        this.y = Math.random() * canvas.height;
        this.size = Math.random() * 2 + 0.5;
        this.speedX = (Math.random() - 0.5) * 1;
        this.speedY = (Math.random() - 0.5) * 1;
      }
      update() {
        this.x += this.speedX;
        this.y += this.speedY;
        if (this.x < 0 || this.x > canvas.width) this.speedX *= -1;
        if (this.y < 0 || this.y > canvas.height) this.speedY *= -1;
      }
      draw() {
        ctx.fillStyle = 'rgba(255,0,0,0.7)';
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    function init() {
      particlesArray = [];
      for (let i = 0; i < 100; i++) particlesArray.push(new Particle());
    }

    function animate() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      particlesArray.forEach(p => { p.update(); p.draw(); });
      requestAnimationFrame(animate);
    }

    init();
    animate();
  </script>

    <script>
      // Animação de aparição ao rolar
      const cards = document.querySelectorAll('.img-card');
      const observer = new IntersectionObserver(entries => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            entry.target.style.opacity = '1';
            entry.target.style.transform = 'scale(1)';
          } else {
            entry.target.style.opacity = '0';
            entry.target.style.transform = 'scale(0.95)';
          }
        });
      }, { threshold: 0.2 });
      cards.forEach(card => {
        card.style.opacity = '0';
        observer.observe(card);
      });
    </script>
